apiVersion: apps/v1
kind: Deployment
metadata:
  name: legacy-app
  namespace: onprem-dc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: legacy-app
  template:
    metadata:
      labels:
        app: legacy-app
    spec:
      containers:
      - name: httpbin
        image: kennethreitz/httpbin:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: legacy-app
  namespace: onprem-dc
spec:
  selector:
    app: legacy-app
  ports:
  - port: 80
    targetPort: 80
