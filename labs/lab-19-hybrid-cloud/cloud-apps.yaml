apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: cloud-vpc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web-app
  namespace: cloud-vpc
spec:
  selector:
    app: web-app
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-db
  namespace: cloud-vpc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloud-db
  template:
    metadata:
      labels:
        app: cloud-db
    spec:
      containers:
      - name: redis
        image: redis:alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-db
  namespace: cloud-vpc
spec:
  selector:
    app: cloud-db
  ports:
  - port: 6379
    targetPort: 6379
